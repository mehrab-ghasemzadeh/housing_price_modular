services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: housing_price_prediction
    ports:
      - "8050:8050"
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
